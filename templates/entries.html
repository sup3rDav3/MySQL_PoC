<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entries — HTML View</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e10; --surface: #18181c; --border: #2a2a30;
      --accent: #b8ff57; --accent2: #57c8ff; --text: #e8e8ec; --muted: #6b6b78;
      --mono: 'DM Mono', monospace; --display: 'Syne', sans-serif;
    }
    body {
      background: var(--bg); color: var(--text); font-family: var(--mono);
      min-height: 100vh; padding: 3rem 2rem;
      background-image: radial-gradient(circle at 10% 10%, rgba(184,255,87,0.04) 0%, transparent 50%);
    }
    header {
      max-width: 760px; margin: 0 auto 2.5rem;
      display: flex; align-items: baseline; gap: 1rem;
    }
    h1 { font-family: var(--display); font-size: 1.6rem; font-weight: 800; }
    .count { color: var(--muted); font-size: 0.8rem; }
    table {
      width: 100%; max-width: 760px; margin: 0 auto;
      border-collapse: collapse;
    }
    thead tr {
      border-bottom: 2px solid var(--accent);
    }
    th {
      text-align: left; padding: 0.6rem 1rem;
      font-size: 0.7rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent);
    }
    td {
      padding: 0.85rem 1rem; border-bottom: 1px solid var(--border);
      font-size: 0.85rem; vertical-align: top;
    }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .id-cell { color: var(--muted); width: 60px; }
    .date-cell { color: var(--accent2); white-space: nowrap; font-size: 0.75rem; }
    .empty { text-align: center; padding: 3rem; color: var(--muted); }
    a.back {
      display: block; max-width: 760px; margin: 2rem auto 0;
      color: var(--muted); font-size: 0.78rem; text-decoration: none;
    }
    a.back:hover { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>Entries</h1>
    <span class="count">{{ entries|length }} record{% if entries|length != 1 %}s{% endif %}</span>
  </header>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Content</th>
        <th>Created At</th>
      </tr>
    </thead>
    <tbody>
      {% if entries %}
        {% for e in entries %}
        <tr>
          <td class="id-cell">{{ e.id }}</td>
          <td>{{ e.content }}</td>
          <td class="date-cell">{{ e.created_at }}</td>
        </tr>
        {% endfor %}
      {% else %}
        <tr><td colspan="3" class="empty">No entries yet.</td></tr>
      {% endif %}
    </tbody>
  </table>
  <a class="back" href="/">← Back to input</a>
</body>
</html>
