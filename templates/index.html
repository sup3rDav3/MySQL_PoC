<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MySQL PoC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e10; --surface: #18181c; --border: #2a2a30;
      --accent: #b8ff57; --accent2: #57c8ff; --accent3: #e8a2ff;
      --danger: #ff5757; --warn: #ffaa33; --text: #e8e8ec; --muted: #6b6b78;
      --mono: 'DM Mono', monospace; --display: 'Syne', sans-serif;
    }
    body {
      background: var(--bg); color: var(--text); font-family: var(--mono);
      min-height: 100vh; display: flex; align-items: flex-start;
      justify-content: center; padding: 3rem 2rem;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(184,255,87,0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(87,200,255,0.04) 0%, transparent 50%);
    }
    .card {
      width: 100%; max-width: 700px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 2.5rem; position: relative;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      border-radius: 12px 12px 0 0;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3), var(--danger));
    }
    .label-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1.8rem; }
    .dot {
      width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 8px var(--accent); animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    h1 { font-family: var(--display); font-size: 1.1rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .db-badge {
      margin-left: auto; font-size: 0.65rem; color: var(--accent);
      border: 1px solid rgba(184,255,87,0.3); border-radius: 4px;
      padding: 2px 8px; letter-spacing: 0.06em;
    }
    textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: var(--mono);
      font-size: 0.9rem; padding: 1rem; resize: vertical; min-height: 120px;
      transition: border-color 0.2s; outline: none; line-height: 1.6;
    }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(184,255,87,0.08); }
    textarea::placeholder { color: var(--muted); }
    .char-count { text-align: right; font-size: 0.7rem; color: var(--muted); margin-top: 0.4rem; margin-bottom: 1.4rem; }

    .btn-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr 1fr; gap: 0.6rem; margin-bottom: 0; }
    button {
      border: none; border-radius: 8px; font-family: var(--mono); font-size: 0.72rem;
      font-weight: 500; letter-spacing: 0.04em; padding: 0.75rem 0.4rem;
      cursor: pointer; transition: all 0.15s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-submit { background: var(--accent); color: #0e0e10; }
    .btn-submit:hover:not(:disabled) { background: #caff6b; box-shadow: 0 0 16px rgba(184,255,87,0.3); }

    .btn-json { background: transparent; color: var(--accent2); border: 1px solid rgba(87,200,255,0.4); }
    .btn-json:hover:not(:disabled) { background: rgba(87,200,255,0.08); border-color: var(--accent2); }
    .btn-json.active { background: rgba(87,200,255,0.15); border-color: var(--accent2); }

    .btn-html { background: transparent; color: var(--accent3); border: 1px solid rgba(232,162,255,0.4); }
    .btn-html:hover:not(:disabled) { background: rgba(232,162,255,0.08); border-color: var(--accent3); }
    .btn-html.active { background: rgba(232,162,255,0.15); border-color: var(--accent3); }

    .btn-unsafe { background: transparent; color: var(--danger); border: 1px solid rgba(255,87,87,0.4); }
    .btn-unsafe:hover:not(:disabled) { background: rgba(255,87,87,0.08); border-color: var(--danger); }
    .btn-unsafe.active { background: rgba(255,87,87,0.15); border-color: var(--danger); }

    .btn-clear { background: transparent; color: var(--warn); border: 1px solid rgba(255,170,51,0.4); }
    .btn-clear:hover:not(:disabled) { background: rgba(255,170,51,0.08); border-color: var(--warn); }

    /* Confirm overlay */
    .confirm-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      z-index: 100; align-items: center; justify-content: center;
    }
    .confirm-overlay.visible { display: flex; }
    .confirm-box {
      background: var(--surface); border: 1px solid rgba(255,87,87,0.4);
      border-radius: 12px; padding: 2rem; max-width: 360px; width: 90%;
      position: relative; animation: popIn 0.18s ease;
    }
    @keyframes popIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
    .confirm-box::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      border-radius: 12px 12px 0 0; background: var(--danger);
    }
    .confirm-icon { font-size: 2rem; margin-bottom: 0.8rem; }
    .confirm-box h2 { font-family: var(--display); font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--danger); letter-spacing: 0.05em; }
    .confirm-box p { font-size: 0.8rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.5rem; }
    .confirm-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .confirm-cancel { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .confirm-cancel:hover { color: var(--text); border-color: var(--text); }
    .confirm-delete { background: var(--danger); color: #fff; }
    .confirm-delete:hover { background: #ff7070; box-shadow: 0 0 16px rgba(255,87,87,0.3); }

    /* Toast */
    .toast {
      margin-top: 1.2rem; padding: 0.75rem 1rem; border-radius: 8px;
      font-size: 0.8rem; display: none; align-items: center; gap: 0.5rem;
    }
    .toast.success { background: rgba(184,255,87,0.1); border: 1px solid rgba(184,255,87,0.3); color: var(--accent); display: flex; }
    .toast.error   { background: rgba(255,87,87,0.1);  border: 1px solid rgba(255,87,87,0.3);  color: var(--danger); display: flex; }
    .toast.warn    { background: rgba(255,170,51,0.1); border: 1px solid rgba(255,170,51,0.3); color: var(--warn);   display: flex; }

    /* Results panel */
    .results-panel { display: none; margin-top: 1.5rem; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; animation: slideDown 0.2s ease; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    .results-panel.visible { display: block; }
    .results-header {
      display: flex; align-items: center; gap: 0.5rem; justify-content: space-between;
      padding: 0.6rem 1rem; border-bottom: 1px solid var(--border);
      font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .results-header.json-mode   { color: var(--accent2); background: rgba(87,200,255,0.05); }
    .results-header.html-mode   { color: var(--accent3); background: rgba(232,162,255,0.05); }
    .results-header.unsafe-mode { color: var(--danger);  background: rgba(255,87,87,0.05); }
    .warn-badge {
      font-size: 0.6rem; background: rgba(255,87,87,0.15); border: 1px solid rgba(255,87,87,0.5);
      border-radius: 4px; padding: 1px 6px; animation: warnpulse 1.2s ease-in-out infinite;
    }
    @keyframes warnpulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .results-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0 0.2rem; line-height: 1; letter-spacing: 0; text-transform: none; margin-left: auto; }
    .results-close:hover { color: var(--text); }

    /* JSON */
    .json-body {
      background: var(--bg); padding: 1.2rem; font-size: 0.8rem;
      line-height: 1.7; overflow-x: auto; max-height: 360px; overflow-y: auto;
    }
    .j-key  { color: var(--accent2); }
    .j-str  { color: #f0c070; }
    .j-num  { color: var(--accent); }
    .j-null { color: var(--muted); }
    .j-bool { color: var(--accent3); }

    /* HTML table */
    .html-body { background: var(--bg); max-height: 360px; overflow-y: auto; }
    .html-body table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .html-body thead tr { border-bottom: 1px solid var(--border); }
    .html-body th { text-align: left; padding: 0.6rem 1rem; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent3); }
    .html-body td { padding: 0.75rem 1rem; border-bottom: 1px solid rgba(42,42,48,0.6); vertical-align: top; }
    .html-body tr:last-child td { border-bottom: none; }
    .html-body tr:hover td { background: rgba(255,255,255,0.02); }
    .id-cell   { color: var(--muted); width: 50px; }
    .date-cell { color: var(--accent2); font-size: 0.72rem; white-space: nowrap; }

    .empty-state { padding: 2rem; text-align: center; color: var(--muted); font-size: 0.8rem; }
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(14,14,16,0.3); border-top-color: #0e0e10; border-radius: 50%; animation: spin 0.6s linear infinite; display: none; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="label-row">
      <div class="dot"></div>
      <h1>MySQL PoC</h1>
      <span class="db-badge">LIVE DB</span>
    </div>

    <textarea id="content" placeholder="Enter text to store in MySQL..."></textarea>
    <div class="char-count"><span id="charCount">0</span> chars</div>

    <div class="btn-row">
      <button class="btn-submit" onclick="submitEntry()">
        <span id="btnLabel">↑ SUBMIT</span>
        <div class="spinner" id="spinner"></div>
      </button>
      <button class="btn-json"   id="btnJson"   onclick="showResults('json')">{ } JSON</button>
      <button class="btn-html"   id="btnHtml"   onclick="showResults('html')">&lt;/&gt; HTML</button>
      <button class="btn-unsafe" id="btnUnsafe" onclick="showResults('unsafe')">⚠ UNSAFE</button>
      <button class="btn-clear"  id="btnClear"  onclick="confirmClear()">⌫ CLEAR DB</button>
    </div>

    <div class="toast" id="toast"></div>

    <div class="results-panel" id="resultsPanel">
      <div class="results-header" id="resultsHeader">
        <span id="resultsTitle">Results</span>
        <span class="warn-badge" id="warnBadge" style="display:none">XSS ACTIVE</span>
        <button class="results-close" onclick="closeResults()">✕</button>
      </div>
      <div id="resultsBody"></div>
    </div>
  </div>

  <!-- Confirm dialog -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-icon">🗑️</div>
      <h2>CLEAR DATABASE</h2>
      <p>This will permanently delete all entries from the <code>entries</code> table. This cannot be undone.</p>
      <div class="confirm-btns">
        <button class="confirm-cancel" onclick="cancelClear()">Cancel</button>
        <button class="confirm-delete" onclick="clearDB()">Delete All</button>
      </div>
    </div>
  </div>

  <script>
    const textarea = document.getElementById('content');
    const charCount = document.getElementById('charCount');
    let activeMode = null;

    textarea.addEventListener('input', () => { charCount.textContent = textarea.value.length; });

    function showToast(type, html) {
      const t = document.getElementById('toast');
      t.className = `toast ${type}`;
      t.innerHTML = html;
    }

    async function submitEntry() {
      const content = textarea.value.trim();
      const btn = document.querySelector('.btn-submit');
      const label = document.getElementById('btnLabel');
      const spinner = document.getElementById('spinner');

      document.getElementById('toast').className = 'toast';
      document.getElementById('toast').style.display = 'none';

      if (!content) { showToast('error', '✖ Content cannot be empty.'); return; }

      label.style.display = 'none';
      spinner.style.display = 'block';
      btn.disabled = true;

      try {
        const res = await fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content })
        });
        const data = await res.json();
        if (res.ok) {
          showToast('success', `✔ Saved! Entry ID: <strong>#${data.id}</strong>`);
          textarea.value = ''; charCount.textContent = '0';
          if (activeMode) showResults(activeMode);
        } else {
          showToast('error', `✖ ${data.error || 'Something went wrong.'}`);
        }
      } catch (e) {
        showToast('error', '✖ Could not reach the server.');
      } finally {
        label.style.display = 'inline';
        spinner.style.display = 'none';
        btn.disabled = false;
      }
    }

    async function showResults(mode) {
      activeMode = mode;
      ['btnJson','btnHtml','btnUnsafe'].forEach(id => {
        document.getElementById(id).classList.remove('active');
      });
      document.getElementById(
        mode === 'json' ? 'btnJson' : mode === 'html' ? 'btnHtml' : 'btnUnsafe'
      ).classList.add('active');

      const panel  = document.getElementById('resultsPanel');
      const header = document.getElementById('resultsHeader');
      const title  = document.getElementById('resultsTitle');
      const badge  = document.getElementById('warnBadge');
      const body   = document.getElementById('resultsBody');

      panel.classList.add('visible');
      header.className = `results-header ${mode}-mode`;
      badge.style.display = mode === 'unsafe' ? 'inline' : 'none';
      title.textContent = mode === 'json' ? '{ } JSON Output' : mode === 'html' ? '</> HTML Table (safe)' : '⚠ Unsafe HTML — XSS Demo';
      body.innerHTML = '<div class="empty-state">Loading...</div>';

      try {
        const res = await fetch('/entries/json');
        const data = await res.json();
        if (mode === 'json') {
          body.innerHTML = `<div class="json-body">${syntaxHighlight(data)}</div>`;
        } else if (mode === 'html') {
          body.innerHTML = renderTable(data, true);
        } else {
          body.innerHTML = renderTable(data, false);
        }
      } catch (e) {
        body.innerHTML = '<div class="empty-state">Failed to load data.</div>';
      }
    }

    function closeResults() {
      document.getElementById('resultsPanel').classList.remove('visible');
      ['btnJson','btnHtml','btnUnsafe'].forEach(id => document.getElementById(id).classList.remove('active'));
      activeMode = null;
    }

    function confirmClear() {
      document.getElementById('confirmOverlay').classList.add('visible');
    }

    function cancelClear() {
      document.getElementById('confirmOverlay').classList.remove('visible');
    }

    async function clearDB() {
      cancelClear();
      const btn = document.getElementById('btnClear');
      btn.disabled = true;
      btn.textContent = '...';
      try {
        const res = await fetch('/clear', { method: 'POST' });
        const data = await res.json();
        if (res.ok) {
          showToast('warn', `⌫ Database cleared. ${data.deleted} entr${data.deleted === 1 ? 'y' : 'ies'} removed.`);
          if (activeMode) showResults(activeMode);
        } else {
          showToast('error', `✖ ${data.error || 'Clear failed.'}`);
        }
      } catch (e) {
        showToast('error', '✖ Could not reach the server.');
      } finally {
        btn.disabled = false;
        btn.textContent = '⌫ CLEAR DB';
      }
    }

    function syntaxHighlight(json) {
      const str = JSON.stringify(json, null, 2);
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m => {
          let c = 'j-num';
          if (/^"/.test(m)) c = /:$/.test(m) ? 'j-key' : 'j-str';
          else if (/true|false/.test(m)) c = 'j-bool';
          else if (/null/.test(m)) c = 'j-null';
          return `<span class="${c}">${m}</span>`;
        });
    }

    function renderTable(data, safe) {
      if (!data.length) return '<div class="empty-state">No entries — database is empty.</div>';
      const rows = data.map(e => `
        <tr>
          <td class="id-cell">${e.id}</td>
          <td>${safe ? escHtml(e.content) : e.content}</td>
          <td class="date-cell">${e.created_at}</td>
        </tr>`).join('');
      return `<div class="html-body"><table>
        <thead><tr><th>#</th><th>Content</th><th>Created At</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Close confirm on overlay click
    document.getElementById('confirmOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) cancelClear();
    });

    textarea.addEventListener('keydown', e => {
      if ((e.ctrlKey||e.metaKey) && e.key==='Enter') submitEntry();
    });
  </script>
</body>
</html>
